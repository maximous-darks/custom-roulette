let currentSet = [];
let currentIndex = 0;

const display = document.getElementById('level-display');
const input = document.getElementById('numberInput');
const submitBtn = document.getElementById('submitBtn');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const generatedList = document.getElementById('generated-list');
const levelSetSelect = document.getElementById('levelSet');

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function updateDisplay() {
  if(currentIndex < currentSet.length){
    display.innerText = currentSet[currentIndex];
    input.placeholder = `${currentIndex + 1}% or more`;

    // Add to generated list if new
    if(!generatedList.children[currentIndex]){
      const li = document.createElement('li');
      li.innerText = currentSet[currentIndex];
      generatedList.appendChild(li);
    }
  } else {
    display.innerText = "GG my slime";
    input.disabled = true;
    submitBtn.disabled = true;
  }
}

// Start button
startBtn.addEventListener('click', () => {
  const selectedSet = levelSetSelect.value;
  currentSet = [...levelSets[selectedSet]];
  shuffleArray(currentSet);
  currentIndex = 0;
  generatedList.innerHTML = "";
  input.disabled = false;
  submitBtn.disabled = false;
  input.value = "";
  updateDisplay();
});

// Reset button
resetBtn.addEventListener('click', () => {
  currentSet = [];
  currentIndex = 0;
  display.innerText = "Select a set and press Start!";
  input.value = "";
  input.disabled = true;
  submitBtn.disabled = true;
  generatedList.innerHTML = "";
});

// Submit button
submitBtn.addEventListener('click', () => {
  let val = parseInt(input.value.trim());
  if(isNaN(val)) {
    alert("Please type a valid number!");
    return;
  }
  if(val > 100) {
    alert("Cannot exceed 100%!");
    return;
  }
  if(val >= currentIndex + 1) {
    currentIndex = val; // advance index to typed number
    updateDisplay();
    input.value = "";
  } else {
    alert(`You must type ${currentIndex + 1}% or more!`);
  }
});
